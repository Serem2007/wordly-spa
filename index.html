<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wordly Dictionary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Wordly Dictionary</h1>

    <!-- Search Form -->
    <form id="searchForm">
        <input type="text" id="wordInput" placeholder="Enter a word..." required>
        <button type="submit">Search</button>
    </form>

    <!-- Results Section -->
    <div id="result">
        <p>Search for a word to see its meaning.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
